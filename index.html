<!DOCTYPE html>
<html>
<head>
  <title>Fintech Internal Chat</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; background-color: #f4f7f6; }
    
    #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #2c3e50; display: flex; justify-content: center; align-items: center; z-index: 1000; }
    .login-box { background: white; padding: 40px; border-radius: 10px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 300px; }
    .login-box h2 { margin-top: 0; color: #2c3e50; font-size: 1.5rem; margin-bottom: 20px;}
    .login-box input { padding: 12px; width: 90%; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 5px; font-size: 1rem; outline: none;}
    .login-box input:focus { border-color: #3498db; }
    .login-box button { background: #3498db; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .login-box button:hover { background: #2980b9; }

    #sidebar { width: 250px; background-color: #2c3e50; color: white; display: flex; flex-direction: column; }
    .sidebar-header { padding: 20px; font-size: 1.2rem; font-weight: bold; border-bottom: 1px solid #1a252f; }
    .channel-list { list-style: none; padding: 0; margin: 0; flex-grow: 1; }
    .channel-item { padding: 15px 20px; cursor: pointer; border-bottom: 1px solid #34495e; transition: background 0.2s; }
    .channel-item:hover, .channel-item.active { background-color: #34495e; border-left: 4px solid #3498db; }
    
    #main-chat { flex-grow: 1; display: flex; flex-direction: column; background-color: white; position: relative; }
    #chat-header { padding: 20px; border-bottom: 1px solid #eee; font-size: 1.2rem; font-weight: bold; background: #fff; }
    #messages { list-style-type: none; margin: 0; padding: 20px; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
    
    .message-container { display: flex; flex-direction: column; }
    .message-sender { font-size: 0.8rem; color: #7f8c8d; margin-bottom: 2px; font-weight: bold; }
    
    /* UPGRADED: Flex-column forces text and files to stack neatly! */
    .message-bubble { background: #ecf0f1; padding: 10px 15px; border-radius: 15px; max-width: 70%; align-self: flex-start; word-break: break-word; display: flex; flex-direction: column; gap: 6px;}
    .message-bubble.mentioned { background: #ffeaa7; border: 1px solid #fdcb6e; font-weight: bold; }
    
    /* UPGRADED: Pulls the bubble to the right for "Me" messages */
    .message-container.me { align-items: flex-end; }
    .message-container.me .message-bubble { background: #e3f2fd; align-self: flex-end; }
    .message-container.me .reaction-bar { justify-content: flex-end; }

    /* NEW: Reply Bubble Styles */
    .reply-quote { background: rgba(0,0,0,0.05); border-left: 4px solid #3498db; padding: 6px 10px; border-radius: 4px; font-size: 0.85rem; color: #555; cursor: pointer; transition: background 0.2s; }
    .reply-quote:hover { background: rgba(0,0,0,0.1); }
    .reply-quote-sender { font-weight: bold; color: #2c3e50; margin-bottom: 2px; }

    .message-image { max-width: 250px; border-radius: 8px; display: block; cursor: pointer; border: 1px solid #ddd;}
    .message-file { display: inline-flex; align-items: center; gap: 8px; background: #fff; padding: 10px 15px; border-radius: 8px; border: 1px solid #ccc; text-decoration: none; color: #2c3e50; font-size: 0.9rem; font-weight: bold; transition: background 0.2s; }
    .message-file:hover { background: #f9f9f9; border-color: #3498db; }
    
    .reaction-bar { display: flex; gap: 5px; margin-top: 5px; min-height: 24px; }
    .reaction-btn { position: relative; background: none; border: 1px solid #ddd; border-radius: 12px; padding: 2px 6px; font-size: 0.8rem; cursor: pointer; background: #fff; display: none; }
    .reaction-btn.has-reactions { display: inline-block; background: #e1f5fe; border-color: #81d4fa; }
    .message-container:hover .reaction-btn { display: inline-block; }
    .reaction-btn:hover { background: #eee; }
    .reaction-btn.has-reactions:hover { background: #b3e5fc; }
    .reaction-count { font-size: 0.75rem; color: #555; margin-left: 3px; font-weight: bold;}

    .reaction-tooltip { visibility: hidden; background-color: #2c3e50; color: #fff; text-align: left; padding: 8px 12px; border-radius: 6px; position: absolute; z-index: 10; bottom: 125%; left: 50%; transform: translateX(-50%); opacity: 0; transition: opacity 0.2s; font-size: 0.8rem; white-space: nowrap; box-shadow: 0px 4px 10px rgba(0,0,0,0.2); pointer-events: none; }
    .reaction-tooltip::after { content: ""; position: absolute; top: 100%; left: 50%; margin-left: -5px; border-width: 5px; border-style: solid; border-color: #2c3e50 transparent transparent transparent; }
    .reaction-btn:hover .reaction-tooltip { visibility: visible; opacity: 1; }
    .tooltip-row { padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .tooltip-row:last-child { border-bottom: none; }

    #form-container { position: relative; padding: 20px; background: #fff; border-top: 1px solid #eee; display: flex; flex-direction: column;}
    
    /* NEW: Reply Preview Box in the form */
    #reply-preview { display: none; background: #e8f4fd; border-left: 4px solid #3498db; padding: 10px 15px; margin-bottom: 10px; border-radius: 4px; font-size: 0.85rem; color: #2c3e50; position: relative; }
    .cancel-reply-btn { background: none; border: none; color: #7f8c8d; cursor: pointer; position: absolute; right: 10px; top: 10px; font-weight: bold; font-size: 1.2rem; line-height: 1;}
    .cancel-reply-btn:hover { color: #e74c3c; }

    #attachment-preview { display: none; background: #f0f4f8; padding: 6px 12px; border-radius: 15px; font-size: 0.85rem; color: #2c3e50; border: 1px solid #dcdde1; align-items: center; gap: 8px; margin-bottom: 10px; width: fit-content; }
    .cancel-attach-btn { background: #ff7675; color: white; border: none; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.8rem; font-weight: bold; padding: 0; line-height: 1;}
    .cancel-attach-btn:hover { background: #d63031; }

    #form { display: flex; width: 100%; align-items: center;}
    #attach-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; padding: 0 15px 0 5px; color: #7f8c8d; transition: color 0.2s;}
    #attach-btn:hover { color: #3498db; }
    #input { flex-grow: 1; padding: 12px 20px; border: 1px solid #ddd; border-radius: 25px; outline: none; font-size: 1rem; }
    #input:focus { border-color: #3498db; }
    #form > button { background: #3498db; color: white; border: none; padding: 0 25px; margin-left: 10px; border-radius: 25px; cursor: pointer; font-size: 1rem; font-weight: bold; height: 42px;}

    #mention-dropdown { position: absolute; bottom: 100%; left: 60px; background: white; border: 1px solid #eee; border-radius: 8px; box-shadow: 0 -4px 15px rgba(0,0,0,0.1); width: 250px; max-height: 200px; overflow-y: auto; display: none; z-index: 100; margin-bottom: 5px; padding: 5px 0;}
    .mention-item { padding: 10px 15px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 0.95rem; color: #2c3e50; }
    .mention-item.active { background: #3498db; color: white; border-radius: 6px; margin: 0 5px; }
    .mention-avatar { background: #ecf0f1; color: #2c3e50; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold; flex-shrink: 0;}
    .mention-item.active .mention-avatar { background: white; color: #3498db; }
  </style>
</head>
<body>

  <div id="login-overlay">
    <div class="login-box">
      <h2>Comms Workspace</h2>
      <input type="text" id="username-input" placeholder="Enter your full name..." autocomplete="off">
      <button id="join-btn">Join Chat</button>
    </div>
  </div>

  <div id="sidebar">
    <div class="sidebar-header">Comms Workspace</div>
    <ul class="channel-list">
      <li class="channel-item active" data-room="General"># General</li>
      <li class="channel-item" data-room="Management"># Management</li>
      <li class="channel-item" data-room="Engineering"># Engineering</li>
      <li class="channel-item" data-room="Scrum-Daily"># Scrum-Daily</li>
    </ul>
  </div>

  <div id="main-chat">
    <div id="chat-header"># General</div>
    <ul id="messages"></ul>
    
    <div id="form-container">
      <div id="mention-dropdown"></div>
      
      <div id="reply-preview"></div>
      
      <div id="attachment-preview"></div>

      <form id="form" action="">
        <input type="file" id="file-input" style="display: none;" />
        <button type="button" id="attach-btn" title="Attach a file">📎</button>
        <input id="input" autocomplete="off" placeholder="Message channel..." />
        <button type="submit">Send</button>
      </form>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let username = "Anonymous";
    let currentRoom = "General";
    
    let availableUsers = [];
    let filteredUsers = [];
    let selectedMentionIndex = 0;
    let savedCursorPos = 0; 

    let attachedFileData = null;
    
    // NEW: Variable to hold the message we are replying to
    let replyingToMessage = null;

    const loginOverlay = document.getElementById('login-overlay');
    const usernameInput = document.getElementById('username-input');
    const joinBtn = document.getElementById('join-btn');
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const messages = document.getElementById('messages');
    const chatHeader = document.getElementById('chat-header');
    const channelItems = document.querySelectorAll('.channel-item');
    const mentionDropdown = document.getElementById('mention-dropdown');
    
    const attachBtn = document.getElementById('attach-btn');
    const fileInput = document.getElementById('file-input');
    const attachmentPreview = document.getElementById('attachment-preview');
    const replyPreview = document.getElementById('reply-preview');

    joinBtn.addEventListener('click', () => {
      const enteredName = usernameInput.value.trim();
      if (enteredName !== "") {
        username = enteredName;
        loginOverlay.style.display = 'none'; 
        if (Notification.permission !== "granted" && Notification.permission !== "denied") {
          Notification.requestPermission();
        }
        socket.emit('join room', { room: currentRoom, username: username });
      }
    });

    socket.on('room users', (users) => {
      availableUsers = users.filter(u => u !== username);
    });

    input.addEventListener('keyup', () => { savedCursorPos = input.selectionStart; });
    input.addEventListener('click', () => { savedCursorPos = input.selectionStart; });

    input.addEventListener('input', () => {
      savedCursorPos = input.selectionStart;
      const val = input.value;
      const textBeforeCursor = val.substring(0, savedCursorPos);
      const match = textBeforeCursor.match(/(?:^|\s)@([a-zA-Z0-9_]*)$/);

      if (match) {
        const searchTerm = match[1].toLowerCase();
        filteredUsers = availableUsers.filter(u => u.toLowerCase().startsWith(searchTerm));
        if (filteredUsers.length > 0) {
          buildMentionDropdown();
        } else {
          closeMentionDropdown();
        }
      } else {
        closeMentionDropdown();
      }
    });

    function buildMentionDropdown() {
      mentionDropdown.innerHTML = '';
      mentionDropdown.style.display = 'block';

      if (selectedMentionIndex >= filteredUsers.length) selectedMentionIndex = 0;

      filteredUsers.forEach((user, index) => {
        const item = document.createElement('div');
        item.className = 'mention-item';
        const avatar = document.createElement('div');
        avatar.className = 'mention-avatar';
        avatar.textContent = user.charAt(0).toUpperCase();
        const nameSpan = document.createElement('span');
        nameSpan.textContent = user;
        item.appendChild(avatar);
        item.appendChild(nameSpan);

        item.addEventListener('mousedown', (e) => { e.preventDefault(); });
        item.addEventListener('click', () => { insertMention(user); });
        item.addEventListener('mouseenter', () => {
          selectedMentionIndex = index;
          updateActiveHighlight(); 
        });
        mentionDropdown.appendChild(item);
      });
      updateActiveHighlight(); 
    }

    function updateActiveHighlight() {
      const items = mentionDropdown.querySelectorAll('.mention-item');
      items.forEach((item, index) => {
        if (index === selectedMentionIndex) {
          item.classList.add('active');
          item.scrollIntoView({ block: 'nearest' });
        } else {
          item.classList.remove('active');
        }
      });
    }

    function closeMentionDropdown() {
      mentionDropdown.style.display = 'none';
      filteredUsers = [];
      selectedMentionIndex = 0;
    }

    function insertMention(userToTag) {
      const val = input.value;
      const cursor = savedCursorPos; 
      const textBeforeCursor = val.substring(0, cursor);
      const textAfterCursor = val.substring(cursor);

      const match = textBeforeCursor.match(/(?:^|\s)@([a-zA-Z0-9_]*)$/);
      if (match) {
        const startPos = match.index + (match[0].startsWith(' ') ? 1 : 0);
        const newText = textBeforeCursor.substring(0, startPos) + `@${userToTag} ` + textAfterCursor;
        input.value = newText;
        input.focus();
        const newPos = startPos + userToTag.length + 2;
        input.selectionStart = input.selectionEnd = newPos;
        savedCursorPos = newPos; 
      }
      closeMentionDropdown();
    }

    input.addEventListener('keydown', (e) => {
      if (mentionDropdown.style.display === 'block') {
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          selectedMentionIndex = (selectedMentionIndex + 1) % filteredUsers.length;
          updateActiveHighlight();
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          selectedMentionIndex = (selectedMentionIndex - 1 + filteredUsers.length) % filteredUsers.length;
          updateActiveHighlight();
        } else if (e.key === 'Enter' || e.key === 'Tab') {
          e.preventDefault();
          if (filteredUsers[selectedMentionIndex]) {
            insertMention(filteredUsers[selectedMentionIndex]);
          }
        } else if (e.key === 'Escape') {
          closeMentionDropdown();
        }
      }
    });

    attachBtn.addEventListener('click', () => { fileInput.click(); });

    window.clearAttachment = function() {
      attachedFileData = null;
      attachmentPreview.style.display = 'none';
      attachmentPreview.innerHTML = '';
      fileInput.value = ''; 
    };

    // NEW: Functions to handle Reply State
    window.clearReply = function() {
      replyingToMessage = null;
      replyPreview.style.display = 'none';
      replyPreview.innerHTML = '';
    };

    function setReply(data, previewText) {
      replyingToMessage = {
        id: data.id,
        user: data.user,
        text: previewText.length > 50 ? previewText.substring(0, 50) + '...' : previewText
      };
      
      replyPreview.innerHTML = `<button type="button" class="cancel-reply-btn" onclick="clearReply()">×</button><strong>Replying to ${data.user}</strong><br/>${replyingToMessage.text}`;
      replyPreview.style.display = 'block';
      input.focus();
    }

    fileInput.addEventListener('change', function() {
      const file = this.files[0];
      if (!file) return;

      if (file.size > 2 * 1024 * 1024) {
        alert("For this prototype phase, please select a file under 2MB.");
        this.value = ''; 
        return;
      }

      const reader = new FileReader();
      reader.onload = function(e) {
        attachedFileData = { name: file.name, type: file.type, data: e.target.result };
        attachmentPreview.innerHTML = `📎 ${file.name} <button type="button" class="cancel-attach-btn" onclick="clearAttachment()" title="Remove attachment">×</button>`;
        attachmentPreview.style.display = 'inline-flex';
      };
      reader.readAsDataURL(file); 
    });

    function playDing() {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      oscillator.type = 'sine';
      oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); 
      gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime); 
      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      oscillator.start();
      oscillator.stop(audioCtx.currentTime + 0.15); 
    }

    function displayMessage(data) {
      const container = document.createElement('li');
      container.className = 'message-container';
      
      const isMe = (data.user === username);
      if (isMe) {
        container.classList.add('me'); 
      }

      const messageId = data.id || Math.random().toString(36).substr(2, 9);
      container.id = `msg-${messageId}`;
      
      const sender = document.createElement('div');
      sender.className = 'message-sender';
      sender.textContent = isMe ? 'Me' : data.user;
      
      const bubble = document.createElement('div');
      bubble.className = 'message-bubble';
      
      // NEW: Draw the Reply Block if it exists
      if (data.replyTo) {
          const quoteDiv = document.createElement('div');
          quoteDiv.className = 'reply-quote';
          
          // Click the quote to jump back to the original message!
          quoteDiv.addEventListener('click', () => {
              const originalMsg = document.getElementById(`msg-${data.replyTo.id}`);
              if (originalMsg) {
                  originalMsg.scrollIntoView({ behavior: 'smooth', block: 'center' });
                  // Flash the original message so they see it
                  originalMsg.style.transition = 'background 0.5s';
                  originalMsg.style.backgroundColor = '#ffeaa7';
                  setTimeout(() => originalMsg.style.backgroundColor = 'transparent', 1500);
              }
          });

          const quoteSender = document.createElement('div');
          quoteSender.className = 'reply-quote-sender';
          quoteSender.textContent = data.replyTo.user;
          
          const quoteText = document.createElement('div');
          quoteText.textContent = data.replyTo.text;

          quoteDiv.appendChild(quoteSender);
          quoteDiv.appendChild(quoteText);
          bubble.appendChild(quoteDiv);
      }
      
      // UPGRADED: Put text inside its own div so it stacks with the file
      if (data.text) {
          const textDiv = document.createElement('div');
          textDiv.textContent = data.text;
          
          if (data.text.toLowerCase().includes(`@${username.toLowerCase()}`)) {
            bubble.classList.add('mentioned'); 
            if (!isMe) {
              playDing();
              if (document.hidden && Notification.permission === "granted") {
                new Notification(`New mention from ${data.user}`, { body: data.text });
              }
            }
          }
          bubble.appendChild(textDiv);
      }
      
      if (data.file) {
          if (data.file.type.startsWith('image/')) {
              const img = document.createElement('img');
              img.src = data.file.data;
              img.className = 'message-image';
              img.addEventListener('click', () => window.open(data.file.data, '_blank'));
              bubble.appendChild(img);
          } else {
              const link = document.createElement('a');
              link.href = data.file.data;
              link.download = data.file.name;
              link.textContent = `📄 Download ${data.file.name}`;
              link.className = 'message-file';
              bubble.appendChild(link);
          }
      }
      
      container.appendChild(sender);
      container.appendChild(bubble);

      const reactionBar = document.createElement('div');
      reactionBar.className = 'reaction-bar';
      
      // NEW: The Reply Button
      const replyBtn = document.createElement('button');
      replyBtn.className = 'reaction-btn';
      replyBtn.innerHTML = '↩️';
      replyBtn.title = 'Reply';
      replyBtn.addEventListener('click', () => {
          // Figure out what text to show in the preview
          let previewText = data.text ? data.text : (data.file ? `[Attachment: ${data.file.name}]` : 'Message');
          setReply(data, previewText);
      });
      reactionBar.appendChild(replyBtn);

      const emojis = ['👍', '👎', '❤️', '✅', '👀'];
      
      emojis.forEach(emoji => {
        const btn = document.createElement('button');
        btn.className = 'reaction-btn';
        btn.id = `btn-${messageId}-${emoji}`; 
        
        const usersArray = data.reactions && data.reactions[emoji] ? data.reactions[emoji] : [];
        const count = usersArray.length;
        
        const tooltip = document.createElement('div');
        tooltip.className = 'reaction-tooltip';
        tooltip.id = `tooltip-${messageId}-${emoji}`;
        
        if (count > 0) {
          btn.classList.add('has-reactions');
          tooltip.innerHTML = usersArray.map(u => `<div class="tooltip-row">${u}</div>`).join('');
        } else {
          tooltip.innerHTML = `<div class="tooltip-row">React with ${emoji}</div>`;
        }
        
        btn.innerHTML = `${emoji} <span class="reaction-count" id="count-${messageId}-${emoji}">${count > 0 ? count : ''}</span>`;
        btn.appendChild(tooltip); 
        
        btn.addEventListener('click', () => {
          socket.emit('add reaction', {
            roomId: currentRoom,
            msgId: messageId,
            emoji: emoji,
            username: username
          });
        });
        
        reactionBar.appendChild(btn);
      });

      container.appendChild(reactionBar);
      messages.appendChild(container);
      messages.scrollTop = messages.scrollHeight;
    }

    channelItems.forEach(item => {
      item.addEventListener('click', function() {
        document.querySelector('.channel-item.active').classList.remove('active');
        this.classList.add('active');
        const newRoom = this.getAttribute('data-room');
        chatHeader.textContent = `# ${newRoom}`;
        messages.innerHTML = ''; 
        socket.emit('join room', { room: newRoom, username: username }); 
        currentRoom = newRoom;
        clearReply(); // Clear any pending replies when switching channels
      });
    });

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      
      const textVal = input.value.trim();
      
      if (mentionDropdown.style.display !== 'block' && (textVal !== '' || attachedFileData !== null)) {
        
        const payload = { user: username, text: textVal, room: currentRoom };
        
        if (attachedFileData !== null) {
            payload.file = attachedFileData;
        }

        // UPGRADED: Attach the reply data if it exists
        if (replyingToMessage !== null) {
            payload.replyTo = replyingToMessage;
        }
        
        socket.emit('chat message', payload);
        
        input.value = '';
        clearAttachment();
        clearReply(); 
        closeMentionDropdown();
      }
    });

    socket.on('chat message', function(data) {
      displayMessage(data);
    });

    socket.on('chat history', function(historyArray) {
      historyArray.forEach(messageData => {
        displayMessage(messageData);
      });
    });

    socket.on('update reaction', function(data) {
      const btn = document.getElementById(`btn-${data.msgId}-${data.emoji}`);
      const countSpan = document.getElementById(`count-${data.msgId}-${data.emoji}`);
      const tooltip = document.getElementById(`tooltip-${data.msgId}-${data.emoji}`);
      
      if (btn && countSpan && tooltip) {
        const count = data.users.length;
        countSpan.textContent = count > 0 ? count : '';
        
        if (count > 0) {
          btn.classList.add('has-reactions');
          tooltip.innerHTML = data.users.map(u => `<div class="tooltip-row">${u}</div>`).join('');
        } else {
          btn.classList.remove('has-reactions');
          tooltip.innerHTML = `<div class="tooltip-row">React with ${data.emoji}</div>`;
        }
      }
    });
  </script>
</body>
</html>
