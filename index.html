<!DOCTYPE html>
<html>
<head>
  <title>Fintech Internal Chat</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; background-color: #f4f7f6; }
    
    #login-overlay, #create-channel-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(44, 62, 80, 0.9); display: flex; justify-content: center; align-items: center; z-index: 1000; }
    #create-channel-overlay { display: none; } /* Hidden by default */
    
    .modal-box { background: white; padding: 40px; border-radius: 10px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 320px; position: relative;}
    .modal-box h2 { margin-top: 0; color: #2c3e50; font-size: 1.5rem; margin-bottom: 20px;}
    .modal-box input, .modal-box select { padding: 12px; width: 90%; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; font-size: 1rem; outline: none; box-sizing: border-box;}
    .modal-box button.primary { background: #3498db; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 10px;}
    .modal-box button.primary:hover { background: #2980b9; }
    .close-modal { position: absolute; top: 15px; right: 15px; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #7f8c8d; }

    /* User Checkbox List for Admin Channel Creation */
    #user-select-list { max-height: 150px; overflow-y: auto; text-align: left; border: 1px solid #eee; padding: 10px; border-radius: 5px; margin-bottom: 15px; background: #f9f9f9;}
    .user-checkbox-item { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; font-size: 0.9rem;}

    #sidebar { width: 250px; background-color: #2c3e50; color: white; display: flex; flex-direction: column; overflow-y: auto;}
    
    /* UPGRADED: Flex header to hold the Create Channel button */
    .sidebar-header { padding: 20px 20px 10px 20px; font-size: 1.1rem; font-weight: bold; color: #bdc3c7; display: flex; justify-content: space-between; align-items: center;}
    #create-channel-btn { background: none; border: none; color: #3498db; font-size: 1.5rem; cursor: pointer; display: none; line-height: 1; padding: 0;}
    #create-channel-btn:hover { color: #fff; }

    .channel-list { list-style: none; padding: 0; margin: 0; }
    .channel-item { padding: 10px 20px; cursor: pointer; transition: background 0.2s; color: #ecf0f1; font-size: 0.95rem; display: flex; align-items: center; position: relative;}
    .channel-item:hover, .channel-item.active { background-color: #34495e; border-left: 4px solid #3498db; padding-left: 16px;}
    
    /* NEW: Unread Badge Styles */
    .unread-badge { background: #e74c3c; color: white; font-size: 0.7rem; font-weight: bold; padding: 2px 6px; border-radius: 10px; position: absolute; right: 15px; display: none; }

    #main-chat { flex-grow: 1; display: flex; flex-direction: column; background-color: white; position: relative; }
    
    /* UPGRADED: Top Header to hold Mentions Bell */
    #chat-header { padding: 15px 20px; border-bottom: 1px solid #eee; background: #fff; display: flex; justify-content: space-between; align-items: center;}
    .header-title { font-size: 1.2rem; font-weight: bold; }
    
    #mentions-hub { position: relative; cursor: pointer; font-size: 1.5rem; }
    #mentions-badge { background: #e74c3c; color: white; font-size: 0.7rem; font-weight: bold; padding: 2px 5px; border-radius: 50%; position: absolute; top: -5px; right: -8px; display: none; border: 2px solid white;}
    #mentions-dropdown { display: none; position: absolute; top: 40px; right: 0; background: white; width: 300px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); border: 1px solid #eee; border-radius: 8px; z-index: 500; max-height: 350px; overflow-y: auto; flex-direction: column; }
    .mention-alert-item { padding: 12px 15px; border-bottom: 1px solid #f0f0f0; font-size: 0.85rem; color: #2c3e50; transition: background 0.2s; }
    .mention-alert-item:hover { background: #f9f9f9; }
    .mention-alert-item:last-child { border-bottom: none; }
    .mention-alert-header { font-weight: bold; margin-bottom: 4px; color: #3498db;}

    #messages { list-style-type: none; margin: 0; padding: 20px; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
    .message-container { display: flex; flex-direction: column; }
    .message-sender-wrapper { display: flex; align-items: center; gap: 8px; margin-bottom: 2px;}
    .message-sender { font-size: 0.85rem; color: #7f8c8d; font-weight: bold; }
    .dm-hover-btn { display: none; background: #f0f4f8; border: 1px solid #dcdde1; border-radius: 12px; padding: 2px 8px; font-size: 0.7rem; color: #3498db; cursor: pointer; font-weight: bold;}
    .dm-hover-btn:hover { background: #3498db; color: white; border-color: #3498db;}
    .message-sender-wrapper:hover .dm-hover-btn { display: inline-block; }

    .message-bubble { background: #ecf0f1; padding: 10px 15px; border-radius: 15px; max-width: 70%; align-self: flex-start; word-break: break-word; display: flex; flex-direction: column; gap: 6px;}
    .message-bubble.mentioned { background: #ffeaa7; border: 1px solid #fdcb6e; font-weight: bold; }
    .message-container.me { align-items: flex-end; }
    .message-container.me .message-bubble { background: #e3f2fd; align-self: flex-end; }
    .message-container.me .reaction-bar { justify-content: flex-end; }
    .message-container.me .message-sender-wrapper { flex-direction: row-reverse; }

    .reply-quote { background: rgba(0,0,0,0.05); border-left: 4px solid #3498db; padding: 6px 10px; border-radius: 4px; font-size: 0.85rem; color: #555; cursor: pointer; transition: background 0.2s; }
    .message-image { max-width: 250px; border-radius: 8px; display: block; cursor: pointer; border: 1px solid #ddd;}
    .message-file { display: inline-flex; align-items: center; gap: 8px; background: #fff; padding: 10px 15px; border-radius: 8px; border: 1px solid #ccc; text-decoration: none; color: #2c3e50; font-size: 0.9rem; font-weight: bold; transition: background 0.2s; }
    
    .reaction-bar { display: flex; gap: 5px; margin-top: 5px; min-height: 24px; }
    .reaction-btn { position: relative; background: none; border: 1px solid #ddd; border-radius: 12px; padding: 2px 6px; font-size: 0.8rem; cursor: pointer; background: #fff; display: none; }
    .reaction-btn.has-reactions { display: inline-block; background: #e1f5fe; border-color: #81d4fa; }
    .message-container:hover .reaction-btn { display: inline-block; }
    .reaction-count { font-size: 0.75rem; color: #555; margin-left: 3px; font-weight: bold;}
    .reaction-tooltip { visibility: hidden; background-color: #2c3e50; color: #fff; text-align: left; padding: 8px 12px; border-radius: 6px; position: absolute; z-index: 10; bottom: 125%; left: 50%; transform: translateX(-50%); opacity: 0; pointer-events: none; }
    .reaction-btn:hover .reaction-tooltip { visibility: visible; opacity: 1; }
    .tooltip-row { padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }

    #form-container { position: relative; padding: 20px; background: #fff; border-top: 1px solid #eee; display: flex; flex-direction: column;}
    #reply-preview { display: none; background: #e8f4fd; border-left: 4px solid #3498db; padding: 10px 15px; margin-bottom: 10px; border-radius: 4px; font-size: 0.85rem; color: #2c3e50; position: relative; }
    .cancel-reply-btn { background: none; border: none; color: #7f8c8d; cursor: pointer; position: absolute; right: 10px; top: 10px; font-weight: bold; font-size: 1.2rem;}
    #attachment-preview { display: none; background: #f0f4f8; padding: 6px 12px; border-radius: 15px; font-size: 0.85rem; color: #2c3e50; border: 1px solid #dcdde1; align-items: center; gap: 8px; margin-bottom: 10px; width: fit-content; }
    .cancel-attach-btn { background: #ff7675; color: white; border: none; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.8rem; font-weight: bold;}
    #form { display: flex; width: 100%; align-items: center;}
    #attach-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; padding: 0 15px 0 5px; color: #7f8c8d; transition: color 0.2s;}
    #input { flex-grow: 1; padding: 12px 20px; border: 1px solid #ddd; border-radius: 25px; outline: none; font-size: 1rem; }
    #form > button { background: #3498db; color: white; border: none; padding: 0 25px; margin-left: 10px; border-radius: 25px; cursor: pointer; font-size: 1rem; font-weight: bold; height: 42px;}
    #mention-dropdown { position: absolute; bottom: 100%; left: 60px; background: white; border: 1px solid #eee; border-radius: 8px; box-shadow: 0 -4px 15px rgba(0,0,0,0.1); width: 250px; max-height: 200px; overflow-y: auto; display: none; z-index: 100; margin-bottom: 5px; padding: 5px 0;}
    .mention-item { padding: 10px 15px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 0.95rem; color: #2c3e50; }
    .mention-item.active { background: #3498db; color: white; border-radius: 6px; margin: 0 5px; }
    .mention-avatar { background: #ecf0f1; color: #2c3e50; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold;}
  </style>
</head>
<body>

  <div id="login-overlay">
    <div class="modal-box">
      <h2>Comms Workspace</h2>
      <input type="text" id="username-input" placeholder="Enter your full name..." autocomplete="off">
      <select id="role-input">
        <option value="user">Standard User</option>
        <option value="admin">Project Admin</option>
        <option value="central">Central Admin</option>
      </select>
      <button id="join-btn" class="primary">Join Chat</button>
    </div>
  </div>

  <div id="create-channel-overlay">
    <div class="modal-box">
      <button class="close-modal" onclick="document.getElementById('create-channel-overlay').style.display='none'">×</button>
      <h2>Create Custom Channel</h2>
      <input type="text" id="new-channel-name" placeholder="Channel Name (no spaces)" autocomplete="off">
      <div id="user-select-list">
        </div>
      <button id="submit-channel-btn" class="primary">Create Channel</button>
    </div>
  </div>

  <div id="sidebar">
    <div class="sidebar-header">
        Channels
        <button id="create-channel-btn" title="Create Channel">⊕</button>
    </div>
    <ul class="channel-list" id="channel-list">
      <li class="channel-item active" data-room="General"># General <span class="unread-badge">0</span></li>
      <li class="channel-item" data-room="Management"># Management <span class="unread-badge">0</span></li>
      <li class="channel-item" data-room="Engineering"># Engineering <span class="unread-badge">0</span></li>
      <li class="channel-item" data-room="Scrum-Daily"># Scrum-Daily <span class="unread-badge">0</span></li>
    </ul>

    <div class="sidebar-header" style="border-top: 1px solid #1a252f; margin-top: 15px; padding-top: 15px;">Direct Messages</div>
    <ul class="channel-list" id="dm-list">
      </ul>
  </div>

  <div id="main-chat">
    <div id="chat-header">
        <div class="header-title" id="header-title-text"># General</div>
        
        <div id="mentions-hub">
            🔔<span id="mentions-badge">0</span>
            <div id="mentions-dropdown">
                </div>
        </div>
    </div>
    <ul id="messages"></ul>
    
    <div id="form-container">
      <div id="mention-dropdown"></div>
      <div id="reply-preview"></div>
      <div id="attachment-preview"></div>
      <form id="form" action="">
        <input type="file" id="file-input" style="display: none;" />
        <button type="button" id="attach-btn" title="Attach a file">📎</button>
        <input id="input" autocomplete="off" placeholder="Message channel..." />
        <button type="submit">Send</button>
      </form>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let username = "Anonymous";
    let userRole = "user"; 
    let currentRoom = "General";
    
    let availableUsers = [];
    let filteredUsers = [];
    let selectedMentionIndex = 0;
    let savedCursorPos = 0; 
    let unreadMentionsCount = 0;

    let attachedFileData = null;
    let replyingToMessage = null;

    // DOM Elements
    const loginOverlay = document.getElementById('login-overlay');
    const usernameInput = document.getElementById('username-input');
    const roleInput = document.getElementById('role-input');
    const joinBtn = document.getElementById('join-btn');
    
    const channelList = document.getElementById('channel-list');
    const dmList = document.getElementById('dm-list');
    const createChannelBtn = document.getElementById('create-channel-btn');
    const createChannelOverlay = document.getElementById('create-channel-overlay');
    const userSelectList = document.getElementById('user-select-list');
    
    const mentionsHub = document.getElementById('mentions-hub');
    const mentionsDropdown = document.getElementById('mentions-dropdown');
    const mentionsBadge = document.getElementById('mentions-badge');

    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const messages = document.getElementById('messages');
    const headerTitleText = document.getElementById('header-title-text');
    const mentionDropdown = document.getElementById('mention-dropdown');

    // --- 1. INITIALIZATION & LOGIN ---
    joinBtn.addEventListener('click', () => {
      const enteredName = usernameInput.value.trim();
      if (enteredName !== "") {
        username = enteredName;
        userRole = roleInput.value; 
        
        // Show Admin UI if applicable
        if (userRole === 'admin' || userRole === 'central') {
            createChannelBtn.style.display = 'block';
        }

        loginOverlay.style.display = 'none'; 
        if (Notification.permission !== "granted" && Notification.permission !== "denied") {
          Notification.requestPermission();
        }
        
        // Emitting Login establishes Personal Room
        socket.emit('login', { username: username, role: userRole });
        socket.emit('join room', { room: currentRoom, username: username });
      }
    });

    socket.on('login success', (data) => {
        // Load custom channels this user belongs to
        data.customChannels.forEach(ch => addChannelToSidebar(ch, channelList));
    });

    socket.on('room users', (users) => {
        availableUsers = users.filter(u => u !== username);
    });

    // --- 2. NOTIFICATIONS & UNREAD BADGES ---
    
    // Toggle Mentions Dropdown
    mentionsHub.addEventListener('click', (e) => {
        const isVisible = mentionsDropdown.style.display === 'flex';
        mentionsDropdown.style.display = isVisible ? 'none' : 'flex';
        if (!isVisible) {
            unreadMentionsCount = 0; // Clear badge on open
            mentionsBadge.style.display = 'none';
        }
        e.stopPropagation();
    });
    document.addEventListener('click', () => mentionsDropdown.style.display = 'none');

    function processMentionAlert(data) {
        if (data.user === username) return;
        
        unreadMentionsCount++;
        mentionsBadge.textContent = unreadMentionsCount;
        mentionsBadge.style.display = 'block';
        playDing();

        if (Notification.permission === "granted" && document.hidden) {
            new Notification(`Mention from ${data.user}`, { body: data.text });
        }

        // Add to the dropdown
        const alertDiv = document.createElement('div');
        alertDiv.className = 'mention-alert-item';
        const displayRoomName = data.room.startsWith('DM-') ? 'Direct Message' : `#${data.room}`;
        alertDiv.innerHTML = `<div class="mention-alert-header">${data.user} in ${displayRoomName}</div>${data.text}`;
        
        // Clicking notification jumps to channel
        alertDiv.addEventListener('click', () => {
            ensureSidebarItemExists(data.room, data.user);
            const targetEl = document.querySelector(`.channel-item[data-room="${data.room}"]`);
            if (targetEl) switchRoom(targetEl);
        });
        
        mentionsDropdown.prepend(alertDiv);
    }

    // Handles background incoming messages
    socket.on('unread alert', (data) => {
        if (data.room === currentRoom) return; // Ignore if actively viewing
        
        // 1. Ensure the channel/DM exists in the sidebar
        ensureSidebarItemExists(data.room, data.user);
        
        // 2. Increment Badge
        const targetEl = document.querySelector(`.channel-item[data-room="${data.room}"]`);
        if (targetEl) {
            let badge = targetEl.querySelector('.unread-badge');
            if (badge) {
                const count = parseInt(badge.textContent || 0) + 1;
                badge.textContent = count;
                badge.style.display = 'inline-block';
            }
        }

        // 3. Process Mention
        if (data.text && data.text.toLowerCase().includes(`@${username.toLowerCase()}`)) {
            processMentionAlert(data);
        }
    });

    // --- 3. CHANNEL & DM MANAGEMENT ---
    
    function addChannelToSidebar(roomName, targetList) {
        if (document.querySelector(`.channel-item[data-room="${roomName}"]`)) return; // Prevents dupes
        
        const li = document.createElement('li');
        li.className = 'channel-item';
        li.setAttribute('data-room', roomName);
        
        const displayName = roomName.startsWith('DM-') 
            ? `💬 ${roomName.replace('DM-', '').split('-').find(u => u !== username)}` 
            : `# ${roomName}`;
            
        li.innerHTML = `${displayName} <span class="unread-badge">0</span>`;
        li.addEventListener('click', function() { switchRoom(this); });
        targetList.appendChild(li);
        return li;
    }

    function ensureSidebarItemExists(room, fromUser) {
        if (!document.querySelector(`.channel-item[data-room="${room}"]`)) {
            if (room.startsWith('DM-')) addChannelToSidebar(room, dmList);
            else addChannelToSidebar(room, channelList);
        }
    }

    function switchRoom(element) {
        document.querySelector('.channel-item.active')?.classList.remove('active');
        element.classList.add('active');
        const newRoom = element.getAttribute('data-room');
        
        // Clear unread badge
        const badge = element.querySelector('.unread-badge');
        if (badge) { badge.textContent = '0'; badge.style.display = 'none'; }
        
        if (newRoom.startsWith('DM-')) {
            const otherUser = newRoom.replace('DM-', '').split('-').find(u => u !== username);
            headerTitleText.textContent = `💬 ${otherUser}`;
        } else {
            headerTitleText.textContent = `# ${newRoom}`;
        }

        messages.innerHTML = ''; 
        socket.emit('join room', { room: newRoom, username: username }); 
        currentRoom = newRoom;
        clearReply(); 
    }

    // Attach listener to default HTML channels
    document.querySelectorAll('#channel-list .channel-item').forEach(item => {
        item.addEventListener('click', function() { switchRoom(this); });
    });

    // Triggered when hovering on a name and clicking "Message"
    function openDirectMessage(targetUser) {
        const dmRoomId = `DM-${[username, targetUser].sort().join('-')}`;
        ensureSidebarItemExists(dmRoomId, targetUser);
        const targetEl = document.querySelector(`.channel-item[data-room="${dmRoomId}"]`);
        switchRoom(targetEl);
    }

    // --- 4. ADMIN CUSTOM CHANNELS ---
    createChannelBtn.addEventListener('click', () => {
        userSelectList.innerHTML = ''; // Clear old list
        // Populate checkboxes
        availableUsers.forEach(u => {
            userSelectList.innerHTML += `
                <label class="user-checkbox-item">
                    <input type="checkbox" value="${u}"> ${u}
                </label>`;
        });
        createChannelOverlay.style.display = 'flex';
    });

    document.getElementById('submit-channel-btn').addEventListener('click', () => {
        const nameInput = document.getElementById('new-channel-name').value.trim().replace(/\s+/g, '-');
        if (!nameInput) return;
        
        const selectedUsers = Array.from(userSelectList.querySelectorAll('input:checked')).map(cb => cb.value);
        selectedUsers.push(username); // Always include creator
        
        socket.emit('create custom channel', { name: nameInput, members: selectedUsers });
        createChannelOverlay.style.display = 'none';
        document.getElementById('new-channel-name').value = '';
    });

    socket.on('new custom channel', (channelName) => {
        addChannelToSidebar(channelName, channelList);
    });

    // --- 5. @ MENTIONS AUTOCOMPLETE ---
    input.addEventListener('keyup', () => { savedCursorPos = input.selectionStart; });
    input.addEventListener('click', () => { savedCursorPos = input.selectionStart; });

    input.addEventListener('input', () => {
      savedCursorPos = input.selectionStart;
      const val = input.value;
      const match = val.substring(0, savedCursorPos).match(/(?:^|\s)@([a-zA-Z0-9_]*)$/);

      if (match) {
        const searchTerm = match[1].toLowerCase();
        filteredUsers = availableUsers.filter(u => u.toLowerCase().startsWith(searchTerm));
        if (filteredUsers.length > 0) buildMentionDropdown();
        else closeMentionDropdown();
      } else closeMentionDropdown();
    });

    function buildMentionDropdown() {
      mentionDropdown.innerHTML = '';
      mentionDropdown.style.display = 'block';
      if (selectedMentionIndex >= filteredUsers.length) selectedMentionIndex = 0;

      filteredUsers.forEach((user, index) => {
        const item = document.createElement('div');
        item.className = 'mention-item';
        item.innerHTML = `<div class="mention-avatar">${user.charAt(0).toUpperCase()}</div><span>${user}</span>`;
        item.addEventListener('mousedown', (e) => { e.preventDefault(); });
        item.addEventListener('click', () => { insertMention(user); });
        item.addEventListener('mouseenter', () => { selectedMentionIndex = index; updateActiveHighlight(); });
        mentionDropdown.appendChild(item);
      });
      updateActiveHighlight(); 
    }

    function updateActiveHighlight() {
      const items = mentionDropdown.querySelectorAll('.mention-item');
      items.forEach((item, index) => {
        if (index === selectedMentionIndex) {
          item.classList.add('active'); item.scrollIntoView({ block: 'nearest' });
        } else item.classList.remove('active');
      });
    }

    function closeMentionDropdown() {
      mentionDropdown.style.display = 'none'; filteredUsers = []; selectedMentionIndex = 0;
    }

    function insertMention(userToTag) {
      const val = input.value;
      const match = val.substring(0, savedCursorPos).match(/(?:^|\s)@([a-zA-Z0-9_]*)$/);
      if (match) {
        const startPos = match.index + (match[0].startsWith(' ') ? 1 : 0);
        input.value = val.substring(0, startPos) + `@${userToTag} ` + val.substring(savedCursorPos);
        input.focus();
        input.selectionStart = input.selectionEnd = savedCursorPos = startPos + userToTag.length + 2; 
      }
      closeMentionDropdown();
    }

    input.addEventListener('keydown', (e) => {
      if (mentionDropdown.style.display === 'block') {
        if (e.key === 'ArrowDown') { e.preventDefault(); selectedMentionIndex = (selectedMentionIndex + 1) % filteredUsers.length; updateActiveHighlight(); } 
        else if (e.key === 'ArrowUp') { e.preventDefault(); selectedMentionIndex = (selectedMentionIndex - 1 + filteredUsers.length) % filteredUsers.length; updateActiveHighlight(); } 
        else if (e.key === 'Enter' || e.key === 'Tab') { e.preventDefault(); if (filteredUsers[selectedMentionIndex]) insertMention(filteredUsers[selectedMentionIndex]); } 
        else if (e.key === 'Escape') closeMentionDropdown();
      }
    });

    // --- 6. ATTACHMENTS & REPLIES ---
    document.getElementById('attach-btn').addEventListener('click', () => { document.getElementById('file-input').click(); });

    window.clearAttachment = function() {
      attachedFileData = null;
      document.getElementById('attachment-preview').style.display = 'none';
      document.getElementById('file-input').value = ''; 
    };

    window.clearReply = function() {
      replyingToMessage = null;
      document.getElementById('reply-preview').style.display = 'none';
    };

    function setReply(data, previewText) {
      replyingToMessage = { id: data.id, user: data.user, text: previewText.length > 50 ? previewText.substring(0, 50) + '...' : previewText };
      document.getElementById('reply-preview').innerHTML = `<button type="button" class="cancel-reply-btn" onclick="clearReply()">×</button><strong>Replying to ${data.user}</strong><br/>${replyingToMessage.text}`;
      document.getElementById('reply-preview').style.display = 'block';
      input.focus();
    }

    document.getElementById('file-input').addEventListener('change', function() {
      const file = this.files[0];
      if (!file) return;
      if (file.size > 2 * 1024 * 1024) { alert("File must be under 2MB."); this.value = ''; return; }
      const reader = new FileReader();
      reader.onload = function(e) {
        attachedFileData = { name: file.name, type: file.type, data: e.target.result };
        document.getElementById('attachment-preview').innerHTML = `📎 ${file.name} <button type="button" class="cancel-attach-btn" onclick="clearAttachment()" title="Remove attachment">×</button>`;
        document.getElementById('attachment-preview').style.display = 'inline-flex';
      };
      reader.readAsDataURL(file); 
    });

    function playDing() {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      oscillator.type = 'sine'; oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime); 
      oscillator.connect(gainNode); gainNode.connect(audioCtx.destination);
      oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.15); 
    }

    // --- 7. MESSAGE RENDERING ---
    function displayMessage(data) {
      const container = document.createElement('li');
      container.className = 'message-container';
      
      const isMe = (data.user === username);
      if (isMe) container.classList.add('me'); 

      const messageId = data.id || Math.random().toString(36).substr(2, 9);
      container.id = `msg-${messageId}`;
      
      const senderWrapper = document.createElement('div');
      senderWrapper.className = 'message-sender-wrapper';

      const sender = document.createElement('div');
      sender.className = 'message-sender';
      sender.textContent = isMe ? 'Me' : data.user;
      senderWrapper.appendChild(sender);

      if (!isMe) {
          const hoverDmBtn = document.createElement('button');
          hoverDmBtn.className = 'dm-hover-btn';
          hoverDmBtn.textContent = '💬 Message';
          hoverDmBtn.addEventListener('click', () => openDirectMessage(data.user));
          senderWrapper.appendChild(hoverDmBtn);
      }
      
      const bubble = document.createElement('div');
      bubble.className = 'message-bubble';
      
      if (data.replyTo) {
          const quoteDiv = document.createElement('div');
          quoteDiv.className = 'reply-quote';
          quoteDiv.addEventListener('click', () => {
              const originalMsg = document.getElementById(`msg-${data.replyTo.id}`);
              if (originalMsg) {
                  originalMsg.scrollIntoView({ behavior: 'smooth', block: 'center' });
                  originalMsg.style.transition = 'background 0.5s'; originalMsg.style.backgroundColor = '#ffeaa7';
                  setTimeout(() => originalMsg.style.backgroundColor = 'transparent', 1500);
              }
          });
          quoteDiv.innerHTML = `<div class="reply-quote-sender">${data.replyTo.user}</div><div>${data.replyTo.text}</div>`;
          bubble.appendChild(quoteDiv);
      }
      
      if (data.text) {
          const textDiv = document.createElement('div');
          textDiv.textContent = data.text;
          if (data.text.toLowerCase().includes(`@${username.toLowerCase()}`)) {
            bubble.classList.add('mentioned'); 
            // Active view mention processing
            if (!isMe) processMentionAlert(data);
          }
          bubble.appendChild(textDiv);
      }
      
      if (data.file) {
          if (data.file.type.startsWith('image/')) {
              const img = document.createElement('img');
              img.src = data.file.data; img.className = 'message-image';
              img.addEventListener('click', () => window.open(data.file.data, '_blank'));
              bubble.appendChild(img);
          } else {
              const link = document.createElement('a');
              link.href = data.file.data; link.download = data.file.name;
              link.textContent = `📄 Download ${data.file.name}`; link.className = 'message-file';
              bubble.appendChild(link);
          }
      }
      
      container.appendChild(senderWrapper);
      container.appendChild(bubble);

      const reactionBar = document.createElement('div');
      reactionBar.className = 'reaction-bar';
      
      const replyBtn = document.createElement('button');
      replyBtn.className = 'reaction-btn'; replyBtn.innerHTML = '↩️'; replyBtn.title = 'Reply';
      replyBtn.addEventListener('click', () => {
          setReply(data, data.text ? data.text : (data.file ? `[Attachment: ${data.file.name}]` : 'Message'));
      });
      reactionBar.appendChild(replyBtn);

      const emojis = ['👍', '👎', '❤️', '✅', '👀'];
      emojis.forEach(emoji => {
        const btn = document.createElement('button');
        btn.className = 'reaction-btn'; btn.id = `btn-${messageId}-${emoji}`; 
        const usersArray = data.reactions && data.reactions[emoji] ? data.reactions[emoji] : [];
        const count = usersArray.length;
        
        const tooltip = document.createElement('div');
        tooltip.className = 'reaction-tooltip'; tooltip.id = `tooltip-${messageId}-${emoji}`;
        if (count > 0) { btn.classList.add('has-reactions'); tooltip.innerHTML = usersArray.map(u => `<div class="tooltip-row">${u}</div>`).join(''); } 
        else tooltip.innerHTML = `<div class="tooltip-row">React with ${emoji}</div>`;
        
        btn.innerHTML = `${emoji} <span class="reaction-count" id="count-${messageId}-${emoji}">${count > 0 ? count : ''}</span>`;
        btn.appendChild(tooltip); 
        btn.addEventListener('click', () => { socket.emit('add reaction', { roomId: currentRoom, msgId: messageId, emoji: emoji, username: username }); });
        reactionBar.appendChild(btn);
      });

      container.appendChild(reactionBar);
      messages.appendChild(container);
      messages.scrollTop = messages.scrollHeight;
    }

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      const textVal = input.value.trim();
      if (mentionDropdown.style.display !== 'block' && (textVal !== '' || attachedFileData !== null)) {
        const payload = { user: username, text: textVal, room: currentRoom };
        if (attachedFileData !== null) payload.file = attachedFileData;
        if (replyingToMessage !== null) payload.replyTo = replyingToMessage;
        
        socket.emit('chat message', payload);
        input.value = ''; clearAttachment(); clearReply(); closeMentionDropdown();
      }
    });

    socket.on('chat message', function(data) { displayMessage(data); });
    socket.on('chat history', function(historyArray) { historyArray.forEach(messageData => displayMessage(messageData)); });

    socket.on('update reaction', function(data) {
      const btn = document.getElementById(`btn-${data.msgId}-${data.emoji}`);
      const countSpan = document.getElementById(`count-${data.msgId}-${data.emoji}`);
      const tooltip = document.getElementById(`tooltip-${data.msgId}-${data.emoji}`);
      
      if (btn && countSpan && tooltip) {
        const count = data.users.length;
        countSpan.textContent = count > 0 ? count : '';
        if (count > 0) {
          btn.classList.add('has-reactions'); tooltip.innerHTML = data.users.map(u => `<div class="tooltip-row">${u}</div>`).join('');
        } else {
          btn.classList.remove('has-reactions'); tooltip.innerHTML = `<div class="tooltip-row">React with ${data.emoji}</div>`;
        }
      }
    });
  </script>
</body>
