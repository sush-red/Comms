<!DOCTYPE html>
<html>
  <head>
    <title>Fintech Internal Chat</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; padding-bottom: 3rem; }
      #messages { list-style-type: none; margin: 0; padding: 0; }
      #messages li { padding: 0.5rem 1rem; border-bottom: 1px solid #eee; }
      #messages li:nth-child(odd) { background: #f9f9f9; }
      #form { background: rgba(0, 0, 0, 0.15); padding: 0.25rem; position: fixed; bottom: 0; width: 100%; display: flex; }
      #input { border: none; padding: 0 1rem; flex-grow: 1; border-radius: 2rem; margin: 0.25rem; height: 3rem; font-size: 16px; }
      #input:focus { outline: none; }
      #form > button { background: #007bff; border: none; padding: 0 1rem; margin: 0.25rem; border-radius: 3px; outline: none; color: white; cursor: pointer; font-size: 16px; font-weight: bold;}
    </style>
  </head>
  <body>
    <ul id="messages"></ul>
    
    <form id="form" action="">
      <input id="input" autocomplete="off" placeholder="Type a message..." /><button>Send</button>
    </form>

    <script src="/socket.io/socket.io.js"></script>
    
    <script>
  const socket = io();

  // 1. Prompt for username on load
  let username = prompt("Please enter your name:");
  if (!username) username = "Anonymous";

  const form = document.getElementById('form');
  const input = document.getElementById('input');
  const messages = document.getElementById('messages');

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    if (input.value) {
      // 2. Send an object containing both username and message
      socket.emit('chat message', { 
        user: username, 
        text: input.value 
      });
      input.value = '';
    }
  });

  socket.on('chat message', function(data) {
    const item = document.createElement('li');
    // 3. Display as "Name: Message"
    item.textContent = `${data.user}: ${data.text}`;
    messages.appendChild(item);
    window.scrollTo(0, document.body.scrollHeight);
  });
</script>
  </body>
</html>
