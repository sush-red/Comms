<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Comms - Communication Platform</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="/style.css">
    <script id="tailwind-config">
        tailwind.config = { darkMode: "class", theme: { extend: {
            "colors": { "secondary-container": "#dae2fd", "on-secondary": "#ffffff", "unread-coral": "#F43F5E", "on-secondary-container": "#5c647a", "on-primary": "#ffffff", "error": "#ba1a1a", "on-surface": "#0b1c30", "outline": "#737686", "secondary": "#565e74", "mention-gold": "#FEF3C7", "primary": "#004ac6", "surface": "#f8f9ff", "on-surface-variant": "#434655", "outgoing-blue": "#EFF6FF", "surface-container-lowest": "#ffffff", "surface-container-high": "#dce9ff", "sidebar-bg": "#1E293B", "primary-container": "#2563eb", "border-subtle": "#E2E8F0", "surface-container-low": "#eff4ff", "surface-container": "#e5eeff" },
            "borderRadius": { "bubble-incoming": "16px 16px 16px 4px", "bubble-outgoing": "16px 16px 4px 16px" },
            "spacing": { "sidebar-width": "280px" },
            "fontFamily": { "headline-sm": ["Inter", "sans-serif"], "label-sm": ["Inter", "sans-serif"], "body-sm": ["Inter", "sans-serif"], "headline-md": ["Inter", "sans-serif"], "body-md": ["Inter", "sans-serif"], "label-md": ["Inter", "sans-serif"] },
            "boxShadow": { "ambient": "0 2px 8px rgba(15, 23, 42, 0.05)", "modal": "0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04)" }
        }}}
    </script>
</head>
<body class="bg-background text-on-background font-body-md text-body-md overflow-hidden h-screen flex">

  <div id="login-overlay" class="fixed inset-0 bg-on-surface/20 backdrop-blur-sm z-[1000] flex items-center justify-center p-4">
    <div class="bg-surface-container-lowest rounded-xl shadow-modal w-full max-w-md p-10 relative">
        <div class="text-center mb-6">
            <div class="w-12 h-12 bg-primary-container/10 text-primary rounded-full flex items-center justify-center mx-auto mb-4"><span class="material-symbols-outlined text-headline-lg">lock</span></div>
            <h3 class="font-headline-md text-headline-md text-on-surface mb-2">Comms</h3>
            <p class="font-body-md text-body-md text-on-surface-variant">Sign in to your workspace.</p>
        </div>
        <div class="space-y-4">
            <input type="text" id="username-input" class="w-full bg-surface-container-low border border-border-subtle rounded-lg px-3 py-2 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none" placeholder="Enter your full name..." autocomplete="off">
            <select id="role-input" class="w-full bg-surface-container-low border border-border-subtle rounded-lg px-3 py-2 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none">
                <option value="user">Standard User</option>
                <option value="admin">Project Admin</option>
                <option value="central">Central Admin</option>
            </select>
            <button id="join-btn" class="w-full bg-primary-container text-on-primary font-headline-sm text-headline-sm py-3 rounded-lg hover:bg-primary transition-colors shadow-sm mt-6">Join Chat</button>
        </div>
    </div>
  </div>

  <div id="create-channel-overlay" class="fixed inset-0 bg-on-surface/20 backdrop-blur-sm z-50 items-center justify-center p-4" style="display: none;">
    <div class="bg-surface-container-lowest rounded-xl shadow-modal w-full max-w-md p-10 relative">
      <button class="absolute top-4 right-4 text-on-surface-variant hover:text-error transition-colors" onclick="document.getElementById('create-channel-overlay').style.display='none'"><span class="material-symbols-outlined">close</span></button>
      <div class="text-center mb-6">
        <div class="w-12 h-12 bg-primary-container/10 text-primary rounded-full flex items-center justify-center mx-auto mb-4"><span class="material-symbols-outlined text-headline-lg">add_box</span></div>
        <h3 class="font-headline-md text-headline-md text-on-surface font-semibold mb-2">Create Channel</h3>
      </div>
      <div class="space-y-4">
        <input type="text" id="new-channel-name" class="w-full bg-surface-container-low border border-border-subtle rounded-lg px-3 py-2 focus:border-primary outline-none" placeholder="e.g. Project-Alpha" autocomplete="off">
        <div id="user-select-list" class="max-h-[160px] overflow-y-auto bg-surface-container-low border border-border-subtle p-2 rounded-lg"></div>
        <button id="submit-channel-btn" class="w-full bg-primary-container text-on-primary py-3 rounded-lg hover:bg-primary transition-colors mt-6">Create Channel</button>
      </div>
    </div>
  </div>

  <nav class="h-screen w-[250px] md:w-sidebar-width fixed left-0 top-0 bg-sidebar-bg flex flex-col p-4 z-20">
    <div class="flex items-center justify-between mb-4 px-2 text-on-primary">
        <h1 class="text-headline-md font-bold">Comms</h1>
    </div>
    
    <div class="flex-1 overflow-y-auto">
        <div class="flex items-center justify-between px-3 mt-4 mb-2 text-on-secondary/70 font-label-sm uppercase">
            <span>Channels</span>
            <button id="create-channel-btn" class="hover:text-white" style="display: none;"><span class="material-symbols-outlined text-[16px]">add</span></button>
        </div>
        <ul id="channel-list" class="space-y-1">
            <li class="channel-item active flex items-center justify-between gap-3 text-on-secondary px-3 py-2 hover:bg-on-secondary-container/10 rounded-lg cursor-pointer bg-secondary border-l-4 border-primary" data-room="General">
                <div class="flex items-center gap-3"><span class="material-symbols-outlined text-[20px]">tag</span><span class="font-label-md text-label-md">General</span></div>
                <span class="unread-badge bg-unread-coral text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full min-w-[20px] text-center" style="display: none;">0</span>
            </li>
            <li class="channel-item flex items-center justify-between gap-3 text-on-secondary/70 px-3 py-2 hover:bg-on-secondary-container/10 rounded-lg cursor-pointer border-l-4 border-transparent" data-room="Management">
                <div class="flex items-center gap-3"><span class="material-symbols-outlined text-[20px]">tag</span><span class="font-label-md text-label-md">Management</span></div>
                <span class="unread-badge bg-unread-coral text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full min-w-[20px] text-center" style="display: none;">0</span>
            </li>
            <li class="channel-item flex items-center justify-between gap-3 text-on-secondary/70 px-3 py-2 hover:bg-on-secondary-container/10 rounded-lg cursor-pointer border-l-4 border-transparent" data-room="Engineering">
                <div class="flex items-center gap-3"><span class="material-symbols-outlined text-[20px]">tag</span><span class="font-label-md text-label-md">Engineering</span></div>
                <span class="unread-badge bg-unread-coral text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full min-w-[20px] text-center" style="display: none;">0</span>
            </li>
        </ul>

        <div class="flex items-center justify-between px-3 mt-8 mb-2 text-on-secondary/70 font-label-sm uppercase">
            <span>Direct Messages</span>
        </div>
        <ul id="dm-list" class="space-y-1"></ul>
    </div>
  </nav>

  <main class="flex-1 flex flex-col ml-[250px] md:ml-sidebar-width h-screen bg-background w-full relative">
    
    <header class="bg-surface shadow-sm flex justify-between items-center w-full px-6 py-4 sticky top-0 z-10 gap-4">
        <div class="flex items-center gap-3 min-w-max">
            <div class="w-10 h-10 rounded-lg bg-surface-container-high flex items-center justify-center text-primary font-bold"><span class="material-symbols-outlined fill">tag</span></div>
            <div><h2 id="header-title-text" class="text-headline-sm font-headline-sm text-on-surface"># General</h2></div>
        </div>
        
        <div class="flex-1 max-w-xl mx-4 relative hidden md:block">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">search</span>
            <input type="text" id="search-input" placeholder="Search everywhere..." class="w-full bg-surface-container border border-border-subtle rounded-full pl-10 pr-4 py-2 focus:border-primary focus:bg-white outline-none transition-colors text-sm">
            <div id="search-results" class="absolute top-full mt-2 w-full bg-white shadow-modal border border-border-subtle rounded-lg z-50 hidden max-h-[300px] overflow-y-auto flex-col p-2 gap-1"></div>
        </div>

        <div class="flex items-center gap-2 min-w-max">
            <button id="mute-btn" class="p-2 rounded-full hover:bg-surface-container-low text-on-surface-variant transition-colors" title="Mute Notifications">
                <span class="material-symbols-outlined text-[20px]">notifications</span>
            </button>
            <div class="w-px h-6 bg-border-subtle mx-2"></div>
            <div id="mentions-hub" class="relative cursor-pointer">
                <button class="p-2 rounded-full hover:bg-surface-container-low text-primary transition-colors">
                    <span class="material-symbols-outlined text-[20px]">inbox</span>
                    <span id="mentions-badge" class="absolute top-1 right-1 w-3 h-3 bg-unread-coral rounded-full border-2 border-surface flex items-center justify-center text-[8px] text-white" style="display: none;">0</span>
                </button>
                <div id="mentions-dropdown" class="absolute top-full right-0 mt-2 bg-white w-[300px] shadow-modal border border-border-subtle rounded-lg z-50 max-h-[350px] overflow-y-auto hidden flex-col"></div>
            </div>
        </div>
    </header>

    <div class="flex-1 overflow-hidden flex flex-col relative">
        <ul id="messages" class="flex-1 overflow-y-auto chat-scroll p-4 md:p-6 pb-20 flex flex-col gap-6"></ul>
        
        <div id="typing-indicator" class="absolute bottom-4 left-6 flex items-center gap-2 text-on-surface-variant font-label-sm text-label-sm animate-pulse hidden bg-surface-container-lowest py-1 px-3 rounded-full shadow-sm border border-border-subtle z-10">
            <span class="material-symbols-outlined text-[16px]">more_horiz</span> <span id="typing-text">Someone is typing...</span>
        </div>
    </div>
    
    <div class="p-4 md:p-6 bg-gradient-to-t from-background via-background to-transparent pt-4 z-20">
        <div id="mention-dropdown"></div>
        <div id="reply-preview" class="hidden bg-surface-container-low border-l-4 border-primary p-3 mb-2 rounded font-body-sm relative"></div>
        <div id="attachment-preview" class="hidden bg-surface-container-low p-2 rounded-lg font-body-sm border border-border-subtle items-center gap-2 mb-2 w-fit"></div>
        
        <form id="form" action="" class="bg-surface-container-lowest border border-border-subtle rounded-xl shadow-ambient p-2 flex items-center gap-2 focus-within:border-primary focus-within:ring-2 focus-within:ring-primary/20 transition-all">
            <input type="file" id="file-input" style="display: none;" />
            <button type="button" id="attach-btn" class="p-2 text-on-surface-variant hover:text-primary transition-colors rounded-lg hover:bg-surface-container-low">
                <span class="material-symbols-outlined">attach_file</span>
            </button>
            <input id="input" class="flex-1 bg-transparent border-none outline-none focus:ring-0 font-body-md text-on-surface placeholder-on-surface-variant py-2 px-2" autocomplete="off" placeholder="Message channel..." />
            <button type="submit" class="p-2 px-4 bg-primary-container text-on-primary rounded-lg hover:bg-primary transition-colors shadow-sm font-bold flex items-center justify-center">
                <span class="material-symbols-outlined">send</span>
            </button>
        </form>
    </div>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/app.js"></script>
</body>
</html>
